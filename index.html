<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Name</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-side">
            <a href="https://www.google.com/maps" target="_blank" id="btn-directions">Οδηγίες</a>
            <a href="tel:+301234567890" id="btn-call">Κλήση</a>
        </div>
        
        <div class="nav-center">
            <img src="logo.png" alt="Logo" class="logo">
        </div>

        <div class="nav-side right">
            <button onclick="changeLanguage('el')">GR</button> | 
            <button onclick="changeLanguage('en')">EN</button>
        </div>
    </header>

    <div class="slideshow-container">
        <div class="slide fade"><img src="slide1.jpeg"></div>
        <div class="slide fade"><img src="slide2.jpeg"></div>
        <div class="slide fade"><img src="slide3.jpeg"></div>
    </div>

    <section id="menu-section">
        <h2 id="menu-title">Το Μενού μας</h2>
        <div class="menu-container">
            <div class="menu-item">
                <p class="item-name" data-el="Χωριάτικη Σαλάτα" data-en="Greek Salad">Χωριάτικη Σαλάτα</p>
                <p class="item-price">8€</p>
            </div>
            </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
