<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Μενού μας | Our Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'; document.querySelector('.logo-text').style.display='block';">
            <span class="logo-text" style="display:none; font-weight:bold; font-size:1.5rem;">ΤΟ ΜΕΝΟΥ ΜΑΣ</span>
        </div>
        
        <div class="header-right">
            <a href="tel:+306900000000" class="phone-link">📞 Καλέστε μας</a>
            <button id="lang-switch">EN</button>
        </div>
    </header>

    <section class="slideshow">
        <div class="video-container">
            <video class="video-slide active" autoplay muted loop playsinline>
                <source src="video1.mp4" type="video/mp4">
            </video>
            <video class="video-slide" autoplay muted loop playsinline>
                <source src="video2.mp4" type="video/mp4">
            </video>
            
            <button class="prev-btn">❮</button>
            <button class="next-btn">❯</button>
        </div>
    </section>

    <section id="menu-section">
        <div id="menu-container">
            </div>
    </section>

    <footer style="text-align: center; padding: 40px; color: #888; font-size: 0.9rem;">
        &copy; 2024 Your Restaurant Name. All rights reserved.
    </footer>

    <script src="script.js"></script>
</body>
</html>
